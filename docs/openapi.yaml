openapi: 3.0.3
info:
  title: Interactive Fiction Platform API
  description: OpenAPI 3.0 Specification for Interactive Fiction Platform (DAG Novel System)
  version: 1.0.0

servers:
  - url: http://localhost:8080
    description: Local Development Server

paths:
  /health:
    get:
      summary: System Health Check
      responses:
        '200':
          description: System is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
        '500':
          $ref: '#/components/responses/InternalError'

  /api/register:
    post:
      summary: Register new user
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [username, email, password]
              properties:
                username:
                  type: string
                email:
                  type: string
                  format: email
                password:
                  type: string
                  description: "ขั้นต่ำ 8 ตัวอักษร ต้องมีตัวอักษรและตัวเลขอย่างละอย่างน้อย 1 ตัว"
                profileImage:
                  type: string
                  format: binary
                  description: "รูปโปรไฟล์ผู้ใช้ (ไม่บังคับ)"
      responses:
        '201':
          description: User registered successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'

  /api/login:
    post:
      summary: User login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                password:
                  type: string
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                  refresh_token:
                    type: string
                  user:
                    $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/refresh:
    post:
      summary: Refresh authentication token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refresh_token]
              properties:
                refresh_token:
                  type: string
      responses:
        '200':
          description: Token refreshed
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/logout:
    post:
      summary: User logout
      responses:
        '200':
          description: Logged out successfully

  /api/users:
    get:
      summary: Get current user profile
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Current user profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/me/novels:
    get:
      summary: Get novels authored by current user (Writer)
      security:
        - BearerAuth: []
      responses:
        '200':
          description: List of writer novels
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Novel'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /categories:
    get:
      summary: Get all novel categories
      responses:
        '200':
          description: List of categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Category'

  /novels:
    get:
      summary: List all novels
      parameters:
        - in: query
          name: category_id
          schema:
            type: integer
        - in: query
          name: status
          schema:
            type: string
      responses:
        '200':
          description: List of novels
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Novel'
    post:
      summary: Create new novel (Writer)
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title, description, category_id]
              properties:
                title:
                  type: string
                description:
                  type: string
                category_id:
                  type: integer
                cover_image:
                  type: string
      responses:
        '201':
          description: Novel created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Novel'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /novels/{id}:
    get:
      summary: Get novel detail by ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Novel detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Novel'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      summary: Update novel detail (Writer)
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                description:
                  type: string
                category_id:
                  type: integer
                cover_image:
                  type: string
                status:
                  type: string
      responses:
        '200':
          description: Novel updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Novel'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      summary: Delete novel (Writer)
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Novel deleted successfully
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /novels/{id}/chapters:
    get:
      summary: Get chapters of a novel
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: List of chapters
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Chapter'

  /novels/{id}/chapters/reorder:
    put:
      summary: Reorder chapters in a novel (Writer)
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [chapter_ids]
              properties:
                chapter_ids:
                  type: array
                  items:
                    type: integer
      responses:
        '200':
          description: Chapters reordered successfully
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /novels/{id}/story-tree:
    get:
      summary: Get story DAG structure for Story Map / Story Structure view
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Story DAG nodes and edges
          content:
            application/json:
              schema:
                type: object
                properties:
                  nodes:
                    type: array
                    items:
                      $ref: '#/components/schemas/SceneNode'
                  edges:
                    type: array
                    items:
                      $ref: '#/components/schemas/ChoiceEdge'

  /novels/{id}/start:
    get:
      summary: Get root scene to start reading a novel
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Initial scene detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Scene'
        '404':
          $ref: '#/components/responses/NotFound'

  /novels/{id}/restart:
    post:
      summary: Restart reading a novel from beginning
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Novel reading restarted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadingProgress'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /chapters:
    post:
      summary: Create new chapter (Writer)
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [novel_id, title]
              properties:
                novel_id:
                  type: integer
                title:
                  type: string
                order_index:
                  type: integer
      responses:
        '201':
          description: Chapter created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Chapter'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /chapters/{id}:
    put:
      summary: Update chapter (Writer)
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                order_index:
                  type: integer
      responses:
        '200':
          description: Chapter updated successfully
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      summary: Delete chapter (Writer)
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Chapter deleted successfully
        '401':
          $ref: '#/components/responses/Unauthorized'

  /chapters/{id}/scenes:
    get:
      summary: Get scenes in a chapter
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: List of scenes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Scene'

  /scenes:
    post:
      summary: Create new scene (Writer)
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [chapter_id, title, content]
              properties:
                chapter_id:
                  type: integer
                title:
                  type: string
                content:
                  type: string
                image_url:
                  type: string
                is_ending:
                  type: boolean
                ending_type:
                  type: string
                  enum: [Good Ending, Bad Ending, True Ending, Secret Ending]
                ending_title:
                  type: string
                ending_description:
                  type: string
      responses:
        '201':
          description: Scene created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Scene'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /scenes/{id}:
    get:
      summary: Get scene detail
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Scene detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Scene'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      summary: Update scene (Writer)
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                content:
                  type: string
                image_url:
                  type: string
                is_ending:
                  type: boolean
                ending_type:
                  type: string
                  enum: [Good Ending, Bad Ending, True Ending, Secret Ending]
                ending_title:
                  type: string
                ending_description:
                  type: string
      responses:
        '200':
          description: Scene updated successfully
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      summary: Delete scene (Writer)
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Scene deleted successfully
        '401':
          $ref: '#/components/responses/Unauthorized'

  /choices:
    post:
      summary: Create choice connecting from_scene to to_scene (DAG Edge)
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [from_scene_id, to_scene_id, choice_text]
              properties:
                from_scene_id:
                  type: integer
                to_scene_id:
                  type: integer
                choice_text:
                  type: string
      responses:
        '201':
          description: Choice created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Choice'
        '400':
          description: Bad request or DAG loop conflict detected
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /choices/{id}:
    put:
      summary: Update choice
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                choice_text:
                  type: string
                to_scene_id:
                  type: integer
      responses:
        '200':
          description: Choice updated successfully
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
    delete:
      summary: Delete choice
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Choice deleted successfully
        '401':
          $ref: '#/components/responses/Unauthorized'

  /progress:
    post:
      summary: Record/Update reader current scene progress
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [novel_id, current_scene_id]
              properties:
                novel_id:
                  type: integer
                current_scene_id:
                  type: integer
      responses:
        '200':
          description: Reading progress recorded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadingProgress'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /history:
    get:
      summary: Get reader history list (Read-Only)
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Reader history list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ReadingHistory'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /user-endings:
    post:
      summary: Record unlocked ending for reader
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [novel_id, scene_id]
              properties:
                novel_id:
                  type: integer
                scene_id:
                  type: integer
      responses:
        '200':
          description: Ending unlocked successfully
        '401':
          $ref: '#/components/responses/Unauthorized'

  /bookshelves:
    get:
      summary: Get user bookshelf or check novel bookmark count
      security:
        - BearerAuth: []
      parameters:
        - in: query
          name: novel_id
          schema:
            type: integer
      responses:
        '200':
          description: Bookshelf details
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      summary: Add novel to bookshelf (Bookmark)
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [novel_id]
              properties:
                novel_id:
                  type: integer
      responses:
        '201':
          description: Bookmarked successfully
        '401':
          $ref: '#/components/responses/Unauthorized'
    delete:
      summary: Remove novel from bookshelf
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [novel_id]
              properties:
                novel_id:
                  type: integer
      responses:
        '200':
          description: Bookmark removed successfully
        '401':
          $ref: '#/components/responses/Unauthorized'

  /likes:
    post:
      summary: Like a novel
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [novel_id]
              properties:
                novel_id:
                  type: integer
      responses:
        '200':
          description: Novel liked
        '401':
          $ref: '#/components/responses/Unauthorized'
    delete:
      summary: Unlike a novel
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [novel_id]
              properties:
                novel_id:
                  type: integer
      responses:
        '200':
          description: Novel unliked
        '401':
          $ref: '#/components/responses/Unauthorized'

  /comments:
    post:
      summary: Add a comment to a novel
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [novel_id, content]
              properties:
                novel_id:
                  type: integer
                scene_id:
                  type: integer
                content:
                  type: string
      responses:
        '201':
          description: Comment created
        '401':
          $ref: '#/components/responses/Unauthorized'
    delete:
      summary: Remove a comment
      security:
        - BearerAuth: []
      parameters:
        - in: query
          name: comment_id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Comment deleted
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/writers/apply:
    post:
      summary: Reader applies to become a writer
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [pen_name, main_contact]
              properties:
                full_name:
                  type: string
                  description: "ชื่อ-นามสกุลจริง"
                pen_name:
                  type: string
                  description: "นามปากกา (บังคับ)"
                bio:
                  type: string
                  description: "คำแนะนำตัวสั้นๆ"
                email:
                  type: string
                  format: email
                  description: "อีเมลสำหรับติดต่อนักเขียน"
                main_contact:
                  type: string
                  description: "ช่องทางติดต่อหลัก (บังคับ)"
                other_links:
                  type: string
                  description: "ช่องทางติดต่อเพิ่มเติม"
                genres:
                  type: string
                  description: "JSON array string เช่น [\"romance\",\"fantasy\"]"
                avatar:
                  type: string
                  format: binary
                  description: "รูปโปรไฟล์นักเขียน (ไม่บังคับ)"
      responses:
        '200':
          description: Writer application submitted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/writers/me:
    get:
      summary: Get writer application status for current user
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Application status
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [none, pending, approved, rejected]
                    description: "none = ไม่เคยสมัคร"
                  writer_id:
                    type: integer
                  pen_name:
                    type: string
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/writers/me/profile:
    put:
      summary: Update writer profile (approved writers only)
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [pen_name]
              properties:
                pen_name:
                  type: string
                  description: "นามปากกา (บังคับ ห้ามเว้นว่าง)"
                bio:
                  type: string
                avatar_url:
                  type: string
                  description: "URL รูปโปรไฟล์ — ได้จากการ Upload ผ่าน POST /upload/image ก่อน"
                contact_required:
                  type: string
                  description: "ช่องทางติดต่อหลัก"
                contact_optional:
                  type: string
                  description: "ช่องทางติดต่อเพิ่มเติม"
                category_ids:
                  type: array
                  items:
                    type: integer
                  description: "รายการ ID หมวดหมู่ที่นักเขียนสังกัด"
      responses:
        '200':
          description: Profile updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/admin/writers/requests:
    get:
      summary: Admin list all pending writer applications
      security:
        - BearerAuth: []
      responses:
        '200':
          description: List of pending writer requests
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/admin/writers/approve:
    post:
      summary: Admin approve writer application
      security:
        - BearerAuth: []
      parameters:
        - in: query
          name: writer_id
          required: true
          schema:
            type: integer
          description: "รหัสคำขอนักเขียนที่ต้องการอนุมัติ"
      responses:
        '200':
          description: Writer application approved
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/admin/writers/reject:
    post:
      summary: Admin reject writer application
      security:
        - BearerAuth: []
      parameters:
        - in: query
          name: writer_id
          required: true
          schema:
            type: integer
          description: "รหัสคำขอนักเขียนที่ต้องการปฏิเสธ"
      responses:
        '200':
          description: Writer application rejected
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /upload/image:
    post:
      summary: Upload image file to MinIO storage
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [image]
              properties:
                image:
                  type: string
                  format: binary
                  description: "ไฟล์รูปภาพ (form field name: image)"
                novel_id:
                  type: integer
                  description: "optional: ถ้าส่งมาจะอัปเดต cover_image ของนิยายเรื่องนั้นด้วย"
      responses:
        '201':
          description: Image uploaded successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  full_url:
                    type: string
                  saved_path:
                    type: string
                  filename:
                    type: string
                  db_status:
                    type: string
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /choice-history:
    post:
      summary: Record reader choice history
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [user_id, choice_id]
              properties:
                user_id:
                  type: integer
                choice_id:
                  type: integer
      responses:
        '200':
          description: Choice history recorded
        '401':
          $ref: '#/components/responses/Unauthorized'

  /writer/{id}:
    get:
      summary: Get public writer profile by writer_id
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
          description: "writer_id (ไม่ใช่ user_id)"
      responses:
        '200':
          description: Writer public profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WriterProfile'
        '404':
          $ref: '#/components/responses/NotFound'

  /writer/{id}/bookshelf-counts:
    get:
      summary: Get bookshelf count per novel for this writer
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
          description: "writer_id"
      responses:
        '200':
          description: Bookshelf counts per novel
          content:
            application/json:
              schema:
                type: object
                properties:
                  author_id:
                    type: integer
                  novels:
                    type: array
                    items:
                      type: object
        '404':
          $ref: '#/components/responses/NotFound'

  /writer/{id}/total-views:
    get:
      summary: Get total view count across all novels by this writer
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
          description: "writer_id"
      responses:
        '200':
          description: Total view count
          content:
            application/json:
              schema:
                type: object
                properties:
                  author_id:
                    type: integer
                  total_view_count:
                    type: integer
        '404':
          $ref: '#/components/responses/NotFound'

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  responses:
    BadRequest:
      description: Bad Request Error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Unauthorized Error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: Forbidden Error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Resource Not Found Error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Conflict:
      description: Resource Conflict Error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    InternalError:
      description: Internal Server Error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
              example: BAD_REQUEST
            message:
              type: string
              example: Invalid input payload

    Book:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        active_loan_id:
          type: integer
          nullable: true

    User:
      type: object
      properties:
        id:
          type: integer
        username:
          type: string
        email:
          type: string
        role:
          type: string
          enum: [reader, writer, admin]

    Category:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string

    Novel:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
        cover_image:
          type: string
        author_id:
          type: integer
        category_id:
          type: integer
        status:
          type: string

    Chapter:
      type: object
      properties:
        id:
          type: integer
        novel_id:
          type: integer
        title:
          type: string
        order_index:
          type: integer

    Scene:
      type: object
      properties:
        id:
          type: integer
        chapter_id:
          type: integer
        title:
          type: string
        content:
          type: string
        image_url:
          type: string
        is_ending:
          type: boolean
        ending_type:
          type: string
        ending_title:
          type: string
        ending_description:
          type: string

    Choice:
      type: object
      properties:
        id:
          type: integer
        from_scene_id:
          type: integer
        to_scene_id:
          type: integer
        choice_text:
          type: string

    SceneNode:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
        data:
          type: object

    ChoiceEdge:
      type: object
      properties:
        id:
          type: string
        source:
          type: string
        target:
          type: string
        label:
          type: string

    ReadingProgress:
      type: object
      properties:
        id:
          type: integer
        user_id:
          type: integer
        novel_id:
          type: integer
        current_scene_id:
          type: integer

    ReadingHistory:
      type: object
      properties:
        id:
          type: integer
        user_id:
          type: integer
        novel_id:
          type: integer
        scene_id:
          type: integer
        choice_id:
          type: integer
        created_at:
          type: string

    AuthResponse:
      type: object
      description: "Response จาก Login และ Register"
      properties:
        token:
          type: string
          description: "JWT Access Token"
        refresh_token:
          type: string
          description: "JWT Refresh Token"
        user:
          type: object
          properties:
            id:
              type: integer
            username:
              type: string
            email:
              type: string
            pic_profile:
              type: string
            role:
              type: string
              enum: [reader, writer, admin]

    WriterProfile:
      type: object
      description: "โปรไฟล์นักเขียน (public)"
      properties:
        writer_id:
          type: integer
        user_id:
          type: integer
        username:
          type: string
        name_lastname:
          type: string
        pen_name:
          type: string
        bio:
          type: string
        email_writer:
          type: string
        contact_info:
          type: object
          description: "JSON object บันทึกช่องทางติดต่อ"
          properties:
            contact_required:
              type: string
              description: "ช่องทางติดต่อหลัก (primary_contact สำหรับ Apply, contact_required สำหรับ UpdateProfile)"
            contact_optional:
              type: string
              description: "ช่องทางติดต่อเพิ่มเติม"
        avatar_url:
          type: string
        status:
          type: string
          enum: [pending, approved, rejected]
        follower_count:
          type: integer
        total_like_count:
          type: integer
        total_view_count:
          type: integer
        categories:
          type: array
          items:
            $ref: '#/components/schemas/Category'
        applied_at:
          type: string
          format: date-time
        approved_at:
          type: string
          format: date-time
